<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikace - Autoškola Pro</title>
    <meta name="description" content="Testy autoškoly.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6b00', 'primary-dark': '#cc5500', 'primary-light': '#ff8800',
                        dark: '#0a0a0f', 'dark-card': '#1a1a2e', 'dark-surface': '#141423'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div id="navbar-placeholder"></div>

    <div class="test-container" style="padding-top:5rem;">
        <div class="container" style="max-width:800px;">

            <!-- TABS: Testy | Profil -->
            <div class="d-flex gap-2 mb-3 justify-content-center">
                <button class="btn-autoskola btn-autoskola-sm active" data-tab="step-group-selection" style="font-size:0.8rem;padding:0.35rem 1rem;">
                    <i class="fas fa-car me-1"></i>Testy
                </button>
                <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" data-tab="step-profile" style="font-size:0.8rem;padding:0.35rem 1rem;">
                    <i class="fas fa-user me-1"></i>Profil
                </button>
            </div>

            <!-- TAB CONTENT: Testy -->
            <div id="step-group-selection" class="tab-content">
                <div class="text-center mb-3">
                    <span class="d-inline-block px-3 py-1 rounded-pill mb-2" style="background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:#ff6b00;font-size:0.7rem;font-weight:600;">
                        <i class="fas fa-car me-1"></i>Krok 1
                    </span>
                    <h5 class="fw-bold mb-1" style="background:linear-gradient(135deg,#fff,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1rem;">
                        Vyberte skupinu
                    </h5>
                    <p class="text-white-50" style="font-size:0.75rem;">Klikněte na skupinu pro výběr kategorie</p>
                </div>
                <div class="row g-2 justify-content-center" id="group-cards"></div>
            </div>

            <!-- STEP 2: CATEGORIES -->
            <div id="step-category-selection" class="d-none tab-content">
                <div class="text-center mb-3">
                    <span class="d-inline-block px-3 py-1 rounded-pill mb-2" style="background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:#ff6b00;font-size:0.7rem;font-weight:600;">
                        <i class="fas fa-folder-open me-1"></i>Krok 2
                    </span>
                    <h5 class="fw-bold mb-1" style="background:linear-gradient(135deg,#fff,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1rem;">
                        Vyberte kategorii
                    </h5>
                    <p class="text-white-50" style="font-size:0.75rem;">Zvolte, co chcete procvičovat</p>
                </div>
                <div class="row g-2 justify-content-center" id="category-cards"></div>
                <div class="text-center mt-3">
                    <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="back-to-groups" style="font-size:0.75rem;padding:0.3rem 0.8rem;">
                        <i class="fas fa-arrow-left me-1"></i>Zpět
                    </button>
                </div>
            </div>

            <!-- STEP 3: TEST -->
            <div id="step-test-interface" class="d-none tab-content">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-2 gap-1">
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="exit-test-btn" style="font-size:0.7rem;padding:0.25rem 0.7rem;">
                            <i class="fas fa-times me-1"></i>Zpět
                        </button>
                        <div id="streak-display"></div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="d-inline-flex align-items-center gap-1 px-2 py-1 rounded-pill" style="background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:#ff6b00;font-size:0.7rem;font-weight:600;">
                            <i class="fas fa-question-circle"></i>
                            <span id="question-counter">0/0</span>
                        </span>
                        <span class="text-white-50" style="font-size:0.7rem;">
                            <i class="fas fa-check-circle me-1" style="color:#22c55e;"></i>
                            <span id="score-display" style="color:#fff;font-weight:700;">0/0</span>
                        </span>
                    </div>
                </div>
                <div class="progress-bar-custom mb-2" style="height:3px;">
                    <div class="progress-fill" id="progress-fill" style="width:0%;"></div>
                </div>

                <!-- XP Info Area (above question - no popups) -->
                <div id="xp-info" class="mb-2"></div>

                <div class="card-autoskola p-3 mb-2">
                    <div id="question-container"></div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="prev-question-btn" style="display:none;font-size:0.75rem;padding:0.35rem 0.8rem;">
                        <i class="fas fa-arrow-left me-1"></i>Zpět
                    </button>
                    <button class="btn-autoskola btn-autoskola-sm" id="next-question-btn" style="font-size:0.75rem;padding:0.35rem 0.8rem;">
                        <i class="fas fa-arrow-right me-1"></i>Další
                    </button>
                </div>
            </div>

            <!-- STEP 4: RESULTS -->
            <div id="step-test-results" class="d-none tab-content">
                <div class="text-center py-3">
                    <div class="animate__animated animate__bounceIn">
                        <i class="fas fa-trophy" id="result-icon" style="font-size:2.2rem;color:#fbbf24;margin-bottom:0.5rem;"></i>
                    </div>
                    <h5 class="fw-bold mb-2" style="background:linear-gradient(135deg,#fff,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Výsledky</h5>
                    <div class="row justify-content-center mt-3">
                        <div class="col-md-8 col-lg-6">
                            <div class="card-autoskola p-3">
                                <div class="row g-2 text-center">
                                    <div class="col-4"><div style="font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;" id="final-score">0</div><div class="text-white-50 small">Správně</div></div>
                                    <div class="col-4"><div style="font-size:1.3rem;font-weight:900;color:#fff;" id="final-total">0</div><div class="text-white-50 small">Celkem</div></div>
                                    <div class="col-4"><div style="font-size:1.3rem;font-weight:900;color:#ff6b00;" id="final-percentage">0%</div><div class="text-white-50 small">Úspěšnost</div></div>
                                </div>
                                <hr style="border-color:rgba(255,107,0,0.15);margin:0.5rem 0;">
                                <div class="text-center mb-2">
                                    <span class="d-inline-block px-3 py-1 rounded-pill fw-bold" id="final-passed" style="font-size:0.8rem;background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3);">Prospěl/a</span>
                                </div>
                                <div class="d-flex gap-2 justify-content-center flex-wrap">
                                    <button class="btn-autoskola btn-autoskola-sm" id="new-test-btn" style="font-size:0.75rem;padding:0.35rem 0.8rem;"><i class="fas fa-redo me-1"></i>Nový test</button>
                                    <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="retry-wrong-btn" style="font-size:0.75rem;padding:0.35rem 0.8rem;"><i class="fas fa-exclamation-triangle me-1"></i>Chybné</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB CONTENT: Profile -->
            <div id="step-profile" class="d-none tab-content">
                <div id="profile-content"></div>
            </div>

        </div>
    </div>

    <footer class="footer" style="padding:0.75rem 0;">
        <div class="container"><p class="mb-0">&copy; 2026 Autoškola Pro</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
