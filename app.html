<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikace - Autoškola Pro</title>
    <meta name="description" content="Testy autoškoly.">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="animated-bg"></div>
    <div id="navbar-placeholder"></div>

    <div class="test-container" style="padding-top:5rem;">
        <div class="container" >

            <div style="display:flex;gap:0.5rem;margin-bottom:1rem;justify-content:center;">
                <button class="btn-autoskola btn-autoskola-sm active" data-tab="step-group-selection" style="font-size:0.8rem;padding:0.35rem 1rem;">
                    <i class="fas fa-car me-1"></i>Testy
                </button>
                <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" data-tab="step-profile" style="font-size:0.8rem;padding:0.35rem 1rem;">
                    <i class="fas fa-user me-1"></i>Profil
                </button>
                <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" data-tab="step-history" style="font-size:0.8rem;padding:0.35rem 1rem;">
                    <i class="fas fa-clock me-1"></i>Historie
                </button>
            </div>

            <div id="step-group-selection" class="tab-content">
                <div style="text-align:center;margin-bottom:1rem;">
                    <span style="display:inline-block;padding:0.2rem 0.6rem;border-radius:999px;margin-bottom:0.3rem;background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:#ff6b00;font-size:0.7rem;font-weight:600;">
                        <i class="fas fa-car me-1"></i>Krok 1
                    </span>
                    <h5 style="font-weight:800;font-size:1rem;background:linear-gradient(135deg,var(--text-primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">
                        Vyberte skupinu
                    </h5>
                    <p class="text-muted" style="font-size:0.75rem;">Klikněte na skupinu pro výběr kategorie</p>
                </div>
                <div id="group-cards"></div>
            </div>

            <div id="step-category-selection" class="d-none tab-content">
                <div style="text-align:center;margin-bottom:1rem;">
                    <span style="display:inline-block;padding:0.2rem 0.6rem;border-radius:999px;margin-bottom:0.3rem;background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:#ff6b00;font-size:0.7rem;font-weight:600;">
                        <i class="fas fa-folder-open me-1"></i>Krok 2
                    </span>
                    <h5 style="font-weight:800;font-size:1rem;background:linear-gradient(135deg,var(--text-primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">
                        Vyberte kategorii
                    </h5>
                    <p class="text-muted" style="font-size:0.75rem;">Zvolte, co chcete procvičovat</p>
                </div>
                <div id="category-cards"></div>
                <div style="text-align:center;margin-top:1rem;">
                    <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="back-to-groups" style="font-size:0.75rem;padding:0.3rem 0.8rem;">
                        <i class="fas fa-arrow-left me-1"></i>Zpět
                    </button>
                </div>
            </div>

            <div id="step-test-interface" class="d-none tab-content">
                <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:0.5rem;gap:0.5rem;">
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="exit-test-btn" style="font-size:0.7rem;padding:0.25rem 0.7rem;">
                            <i class="fas fa-times me-1"></i>Zpět
                        </button>
                    </div>
                    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                        <span style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.5rem;border-radius:999px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444;font-size:0.7rem;font-weight:600;">
                            <i class="fas fa-clock"></i>
                            <span id="timer-display">30:00</span>
                        </span>
                        <span style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.5rem;border-radius:999px;background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:#ff6b00;font-size:0.7rem;font-weight:600;">
                            <i class="fas fa-question-circle"></i>
                            <span id="question-counter">0/0</span>
                        </span>
                        <span style="font-size:0.7rem;color:var(--text-muted);">
                            <i class="fas fa-check-circle me-1" style="color:#22c55e;"></i>
                            <span id="score-display" style="color:var(--text-primary);font-weight:700;">0/0</span>
                        </span>
                    </div>
                </div>
                <div class="progress-bar-custom" style="height:3px;margin-bottom:0.5rem;">
                    <div class="progress-fill" id="progress-fill" style="width:0%;"></div>
                </div>
                <div id="xp-info" style="margin-bottom:0.5rem;"></div>
                <div class="card-autoskola" style="padding:0.75rem;margin-bottom:0.5rem;">
                    <div id="question-container"></div>
                </div>
                <div style="display:flex;justify-content:center;align-items:center;gap:0.75rem;">
                    <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="prev-question-btn" style="display:none;font-size:0.75rem;padding:0.35rem 0.8rem;">
                        <i class="fas fa-arrow-left me-1"></i>Zpět
                    </button>
                    <button class="btn-autoskola btn-autoskola-sm" id="next-question-btn" style="font-size:0.75rem;padding:0.35rem 0.8rem;">
                        <i class="fas fa-arrow-right me-1"></i>Další
                    </button>
                </div>
            </div>

            <div id="step-test-results" class="d-none tab-content">
                <div style="text-align:center;padding:1.5rem 0;">
                    <div class="fade-in">
                        <i class="fas fa-trophy" id="result-icon" style="font-size:2.2rem;color:#fbbf24;margin-bottom:0.5rem;"></i>
                    </div>
                    <h5 style="font-weight:800;margin-bottom:0.5rem;background:linear-gradient(135deg,var(--text-primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Výsledky</h5>
                    <div style="max-width:500px;margin:1rem auto 0;">
                        <div class="card-autoskola" style="padding:1rem;">
                            <div style="display:flex;gap:0.5rem;text-align:center;justify-content:center;">
                                <div style="flex:1;"><div style="font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#22c55e,#16a34a);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;" id="final-score">0</div><div class="text-muted small">Správně</div></div>
                                <div style="flex:1;"><div style="font-size:1.3rem;font-weight:900;color:var(--text-primary);" id="final-total">0</div><div class="text-muted small">Celkem</div></div>
                                <div style="flex:1;"><div style="font-size:1.3rem;font-weight:900;color:#ff6b00;" id="final-percentage">0%</div><div class="text-muted small">Úspěšnost</div></div>
                                <div style="flex:1;"><div style="font-size:1.3rem;font-weight:900;color:#fbbf24;" id="final-points">0</div><div class="text-muted small">Body</div></div>
                            </div>
                            <hr style="border-color:rgba(255,107,0,0.15);margin:0.5rem 0;">
                            <div style="text-align:center;margin-bottom:0.5rem;">
                                <span class="d-inline-block px-3 py-1 rounded-pill fw-bold" id="final-passed" style="font-size:0.8rem;background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3);">Prospěl/a</span>
                            </div>
                            <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
                                <button class="btn-autoskola btn-autoskola-sm" id="new-test-btn" style="font-size:0.75rem;padding:0.35rem 0.8rem;"><i class="fas fa-redo me-1"></i>Nový test</button>
                                <button class="btn-autoskola btn-autoskola-sm btn-autoskola-outline" id="review-wrong-btn" style="font-size:0.75rem;padding:0.35rem 0.8rem;"><i class="fas fa-exclamation-triangle me-1"></i>Chybné otázky</button>
                            </div>
                        </div>
                        <!-- Prohlížení chybných otázek -->
                        <div id="wrong-questions-review" style="display:none;margin-top:1rem;"></div>
                    </div>
                </div>
            </div>

            <div id="step-history" class="d-none tab-content">
                <div style="text-align:center;margin-bottom:1rem;">
                    <h5 style="font-weight:800;font-size:1rem;background:linear-gradient(135deg,var(--text-primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">
                        Historie testů
                    </h5>
                    <div id="history-stats" style="display:flex;gap:1rem;justify-content:center;margin:1rem 0;flex-wrap:wrap;"></div>
                </div>
                <div id="history-list"></div>
            </div>

            <div id="step-profile" class="d-none tab-content">
                <div id="profile-content"></div>
            </div>

        </div>
    </div>

    <footer class="footer" style="padding:0.75rem 0;">
        <div class="container"><p style="color:var(--text-muted);font-size:0.875rem;">&copy; 2026 Autoškola Pro</p></div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
