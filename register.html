<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrace - Autoškola Pro</title>
    <meta name="description" content="Zaregistrujte se do Autoškoly Pro a začněte trénovat testy zdarma.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6b00',
                        'primary-dark': '#cc5500',
                        'primary-light': '#ff8800',
                        dark: '#0a0a0f',
                        'dark-card': '#1a1a2e',
                        'dark-surface': '#141423'
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div id="navbar-placeholder"></div>

    <div class="auth-container">
        <div class="auth-card animate__animated animate__fadeInUp">
            <div class="text-center mb-4">
                <i class="fas fa-graduation-cap" style="color: #ff6b00; font-size: 2.5rem;"></i>
                <h2>Vytvořte si účet</h2>
                <p>Registrujte se a začněte trénovat zdarma</p>
            </div>

            <form id="register-form" class="contact-form">
                <div class="mb-3">
                    <label for="register-name" class="text-sm mb-2">Jméno a příjmení</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.15); border-right: none; border-radius: 0.75rem 0 0 0.75rem; color: #ff6b00;">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="register-name" placeholder="Jan Novák" style="border-radius: 0 0.75rem 0.75rem 0;" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="register-email" class="text-sm mb-2">Emailová adresa</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.15); border-right: none; border-radius: 0.75rem 0 0 0.75rem; color: #ff6b00;">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="register-email" placeholder="jan@novak.cz" style="border-radius: 0 0.75rem 0.75rem 0;" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="register-password" class="text-sm mb-2">Heslo</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.15); border-right: none; border-radius: 0.75rem 0 0 0.75rem; color: #ff6b00;">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="register-password" placeholder="Minimálně 6 znaků" style="border-radius: 0 0.75rem 0.75rem 0;" required>
                    </div>
                    <div class="small text-white-50 mt-1">
                        <i class="fas fa-info-circle me-1" style="color: #ff6b00;"></i>Heslo musí mít alespoň 6 znaků
                    </div>
                </div>

                <div class="mb-4">
                    <label for="register-password-confirm" class="text-sm mb-2">Potvrzení hesla</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.15); border-right: none; border-radius: 0.75rem 0 0 0.75rem; color: #ff6b00;">
                            <i class="fas fa-check-circle"></i>
                        </span>
                        <input type="password" id="register-password-confirm" placeholder="Zadejte heslo znovu" style="border-radius: 0 0.75rem 0.75rem 0;" required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms-agree" required style="border-color: rgba(255,107,0,0.3);">
                        <label class="form-check-label text-white-50 small" for="terms-agree">
                            Souhlasím s <a href="#" style="color: #ff6b00;">podmínkami použití</a> a <a href="#" style="color: #ff6b00;">ochranou osobních údajů</a>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-autoskola btn-autoskola-lg w-100 mb-3">
                    <i class="fas fa-user-plus me-2"></i>Vytvořit účet
                </button>

                <div class="text-center">
                    <p class="text-white-50 small mb-0">
                        Již máte účet?
                        <a href="login.html" style="color: #ff6b00; text-decoration: none; font-weight: 600;">Přihlaste se</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer" style="position: fixed; bottom: 0; left: 0; right: 0;">
        <div class="container">
            <p class="mb-0">&copy; 2026 Autoškola Pro. Všechna práva vyhrazena.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
