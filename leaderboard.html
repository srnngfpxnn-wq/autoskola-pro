<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Žebříček - Autoškola Pro</title>
    <meta name="description" content="Žebříček nejlepších hráčů Autoškoly Pro.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6b00', 'primary-dark': '#cc5500', 'primary-light': '#ff8800',
                        dark: '#0a0a0f', 'dark-card': '#1a1a2e', 'dark-surface': '#141423'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div id="navbar-placeholder"></div>

    <div class="test-container" style="padding-top:5rem;">
        <div class="container" style="max-width:800px;">
            <div class="text-center mb-4">
                <span class="d-inline-block px-3 py-1 rounded-pill mb-2" style="background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:#ff6b00;font-size:0.8rem;font-weight:600;">
                    <i class="fas fa-trophy me-2"></i>Žebříček
                </span>
                <h3 class="fw-bold mb-2" style="background:linear-gradient(135deg,#fff,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
                    TOP 5 nejlepších hráčů
                </h3>
                <p class="text-white-50 small">Nejvíce XP a nejlepší skóre</p>
            </div>

            <div class="card-autoskola p-3 p-md-4">
                <div id="leaderboard-container-full">
                    <div class="empty-state"><i class="fas fa-trophy"></i><p>Načítám žebříček...</p></div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="app.html" class="btn-autoskola app-link">
                    <i class="fas fa-car me-2"></i>Začít trénovat
                </a>
            </div>
        </div>
    </div>

    <footer class="footer" style="padding:1rem 0;">
        <div class="container"><p class="mb-0">&copy; 2026 Autoškola Pro</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
