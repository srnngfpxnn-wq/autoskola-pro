<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení - Autoškola Pro</title>
    <meta name="description" content="Přihlaste se do Autoškoly Pro a začněte trénovat testy.">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
</head>
<body>
    <div class="animated-bg"></div>
    <div id="navbar-placeholder"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align:center;margin-bottom:2rem;">
                <div style="font-size:2.5rem;color:var(--accent);margin-bottom:0.5rem;">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h2>Vítejte zpět</h2>
                <p>Přihlaste se ke svému účtu</p>
            </div>
            <form id="login-form">
                <div style="margin-bottom:1.25rem;">
                    <label for="login-email" style="display:block;color:var(--text-secondary);font-weight:500;margin-bottom:0.5rem;font-size:0.9rem;">Email</label>
                    <input type="email" id="login-email" placeholder="vas@email.cz" required style="width:100%;padding:0.875rem 1.25rem;background:var(--input-bg);border:1px solid var(--border-color);border-radius:0.75rem;color:var(--text-primary);font-size:1rem;transition:all 0.3s;">
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label for="login-password" style="display:block;color:var(--text-secondary);font-weight:500;margin-bottom:0.5rem;font-size:0.9rem;">Heslo</label>
                    <input type="password" id="login-password" placeholder="••••••••" required style="width:100%;padding:0.875rem 1.25rem;background:var(--input-bg);border:1px solid var(--border-color);border-radius:0.75rem;color:var(--text-primary);font-size:1rem;transition:all 0.3s;">
                </div>
                <button type="submit" class="btn-autoskola" style="width:100%;padding:1rem;font-size:1.05rem;">
                    <i class="fas fa-sign-in-alt me-2"></i>Přihlásit se
                </button>
            </form>
            <div style="text-align:center;margin-top:1.5rem;">
                <p style="color:var(--text-muted);font-size:0.9rem;">
                    Nemáte účet? <a href="register.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Registrujte se</a>
                </p>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
